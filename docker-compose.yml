version: '3.8'

services:
  atrain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atrain-dev
    ports:
      - "5000:5000"
    volumes:
      # Mount source code for live development
      - ./aTrain:/app/aTrain
      # Mount sample data if needed
      - ./sample_data:/app/sample_data
      # Persist downloaded models
      - atrain-models:/app/models
      - atrain-models:/root/.cache/huggingface
    environment:
      - FLASK_APP=aTrain.app:app
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    # Run Flask directly with host binding for Docker
    command: python -c "from aTrain.app import app; app.run(host='0.0.0.0', port=5000, debug=True)"
    stdin_open: true
    tty: true

volumes:
  atrain-models:
    driver: local
